[tools]
zig = "0.16.0"
zls = "0.16.0"

[tasks.fmt]
description = "format"
run = "zig fmt src/"

[tasks."fmt-check"]
description = "format check"
run = "zig fmt --check src/"

[tasks.build]
description = "build (compile check)"
run = "zig build --summary all"

[tasks.test]
description = "test"
run = "zig build test --summary all"

# example タスク（build.zig 経由で zctx モジュールを参照）
[tasks."example:basic"]
description = "run example/basic.zig"
run = "zig build run-example-basic --summary all"

[tasks."example:timeout"]
description = "run example/timeout.zig"
run = "zig build run-example-timeout --summary all"

[tasks."example:deadline"]
description = "run example/deadline.zig"
run = "zig build run-example-deadline --summary all"

[tasks."example:propagation"]
description = "run example/propagation.zig"
run = "zig build run-example-propagation --summary all"

[tasks."example:value"]
description = "run example/value.zig"
run = "zig build run-example-value --summary all"

[tasks."example:multi_cancel"]
description = "run example/multi_cancel.zig"
run = "zig build run-example-multi_cancel --summary all"

[tasks.release]
description = "bump version, commit, tag, and push"
run = """
#!/usr/bin/env bash
set -euo pipefail
VERSION=${1:?usage: mise run release <version>}

echo "v$VERSION のリリースを実行します:"
echo "  1. build.zig.zon の .version を \"$VERSION\" に更新"
echo "  2. git commit \"chore: bump version to v$VERSION\""
echo "  3. git tag v$VERSION"
echo "  4. git push origin main v$VERSION"
echo ""
read -r -p "続行しますか? [y/N]: " confirm
case "$confirm" in
  [yY]) ;;
  *) echo "キャンセルしました。"; exit 0 ;;
esac

# 注意: sed -i '' は macOS (BSD sed) 専用。Linux (GNU sed) では -i のみで動作する。
sed -i '' "s/\\.version = \".*\"/\\.version = \"$VERSION\"/" build.zig.zon
git add build.zig.zon
git commit -m "chore: bump version to v$VERSION"
git tag "v$VERSION"
git push origin main "v$VERSION"
"""

[tasks.build-docs]
description = "Build API documentation"
run = "zig build docs --summary all"

[tasks.serve-docs]
description = "Serve API documentation"
depends = ["build-docs"]
run = "npx --yes serve zig-out/docs"
